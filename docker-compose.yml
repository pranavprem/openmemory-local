services:
  mem0_store:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  openmemory-api:
    image: mem0/openmemory-mcp
    ports:
      - "8765:8765"
    depends_on:
      - mem0_store
    environment:
      - USER=${USER}
      - API_KEY=${API_KEY}
      - OPENAI_API_KEY=sk-unused-ollama-only
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ./default_config.json:/app/default_config.json
    restart: unless-stopped

  openmemory-ui:
    image: mem0/openmemory-ui:latest
    ports:
      - "3000:3000"
    depends_on:
      - openmemory-api
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_USER_ID=${USER}
    restart: unless-stopped

volumes:
  qdrant_data:
